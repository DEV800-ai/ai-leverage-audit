name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# leverage-platform is a public dependency declared in pyproject.toml (pinned
# to a specific SHA, see the comment there). CI installs it via `uv sync` like
# any other dep — no deploy key, no auth wall.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Build
        run: uv build

      - name: CLI smoke
        run: uv run audit --help
