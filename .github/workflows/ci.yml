name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Gate 1 CI: deliberately does NOT install the private leverage-platform
# repo. Smoke tests skip the platform import; the rest of the suite still
# catches packaging, lint, and CLI-wiring issues.
#
# Gate 2 will introduce a deploy key (or make leverage-platform public)
# so CI can run the first real e2e test.

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Install dependencies (without leverage-platform extra)
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest

      - name: Build
        run: uv build

      - name: CLI smoke
        run: uv run audit --help
